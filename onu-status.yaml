openapi: 3.1.0
info:
  title: ONU Status API
  version: 1.0.0
servers:
- url: https://api.example.com/fttp/v1
- url: https://staging-api.example.com/fttp/v1
tags:
- name: Health
- name: OLTs
  description: Endpoints related to Optical Line Terminals (OLTs)
- name: ONUs
  description: Endpoints related to Optical Network Units (ONUs)
paths:
  /health:
    get:
      tags:
      - Health
      summary: Health check
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  time:
                    type: string
                    format: date-time
                    example: '2025-10-24T15:00:00Z'
  /olts:
    get:
      tags:
      - OLTs
      summary: List all OLT names
      description: Retrieve a list of all Optical Line Terminal (OLT) names managed
        by the system.
      responses:
        '200':
          description: Successful retrieval of all OLT names
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: string
                      description: OLT name
                      example: denver-olt-05
                example:
                  items:
                  - denver-olt-05
                  - boulder-olt-01
                  - aspen-olt-02
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: unauthorized
                message: Missing or invalid authentication token.
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: not_found
                message: Requested resource not found.
  /olt/{olt-name}:
    get:
      tags:
      - OLTs
      summary: Get details for a specific OLT
      description: Retrieve detailed information about a specific Optical Line Terminal
        (OLT).
      parameters:
      - name: olt-name
        in: path
        required: true
        schema:
          type: string
          maxLength: 64
          pattern: ^[A-Za-z0-9._-]{1,64}$
        description: Name of the OLT (alphanumeric, period, underscore, or dash only)
        example: denver-olt-05
      responses:
        '200':
          description: Successful retrieval of OLT details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Olt'
              examples:
                OltResponse:
                  summary: Example OLT details response
                  description: Example of detailed information for a single OLT, including
                    its location.
                  value:
                    olt-name: denver-olt-05
                    olt-ip-address: 192.168.1.10
                    olt-mac-address: 00:1A:2B:3C:4D:5E
                    olt-model: VendorA-123
                    olt-location: Denver, CO Data Center
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: unauthorized
                message: Missing or invalid authentication token.
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: not_found
                message: Requested resource not found.
  /onus:
    get:
      tags:
      - ONUs
      summary: List all ONUs
      description: Retrieve a list of all Optical Network Units (ONUs) across all
        Optical Line Terminals (OLTs).
      responses:
        '200':
          description: Successful retrieval of all ONU serial numbers
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: string
                      description: ONU serial number
                      example: ABCD12FEED78
                example:
                  items:
                  - ABCD12FEED78
                  - EFGH34BEEF99
                  - IJKL56CAFE22
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: unauthorized
                message: Missing or invalid authentication token.
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: not_found
                message: No ONUs found.
  /olt/{olt-name}/onus:
    get:
      tags:
      - ONUs
      summary: List ONUs for a specific OLT
      description: Retrieve a list of ONU serial numbers connected to the specified
        OLT.
      parameters:
      - name: olt-name
        in: path
        required: true
        schema:
          type: string
          maxLength: 64
          pattern: ^[A-Za-z0-9._-]{1,64}$
        description: Name of the OLT (alphanumeric, period, underscore, or dash only)
        example: denver-olt-05
      responses:
        '200':
          description: Successful retrieval of ONU serial numbers for the specified
            OLT
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: string
                      description: ONU serial number
                      example: ABCD12FEED78
                example:
                  items:
                  - ABCD12FEED78
                  - EFGH34BEEF99
                  - IJKL56CAFE22
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: unauthorized
                message: Missing or invalid authentication token.
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: not_found
                message: Requested resource not found.
  /olt/{olt-name}/{olt-pon-port-id}/onus:
    get:
      tags:
      - ONUs
      summary: List ONUs for a specific OLT PON port
      description: Retrieve a list of Optical Network Units (ONUs) connected to a
        specific PON port on the specified Optical Line Terminal (OLT).
      parameters:
      - name: olt-name
        in: path
        required: true
        schema:
          type: string
          maxLength: 64
          pattern: ^[A-Za-z0-9._-]{1,64}$
        description: Name of the OLT (alphanumeric, period, underscore, or dash only)
        example: denver-olt-05
      - name: olt-pon-port-id
        in: path
        required: true
        schema:
          type: string
          maxLength: 16
          pattern: ^[0-9/]{1,16}$
        description: OLT PON port identifier (e.g., 1/2/3)
        example: 1/2/3
      responses:
        '200':
          description: Successful retrieval of ONU serial numbers for the specified
            OLT PON port
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: string
                      description: ONU serial number
                      example: ABCD12FEED78
                example:
                  items:
                  - ABCD12FEED78
                  - EFGH34BEEF99
                  - IJKL56CAFE22
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: unauthorized
                message: Missing or invalid authentication token.
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: not_found
                message: Requested OLT or PON port not found.
  /onu/{onu-serial-number}:
    get:
      tags:
      - ONUs
      summary: Get status of a specific ONU by serial number
      description: Retrieve detailed operational status information for a specific
        Optical Network Unit (ONU) using its serial number.
      parameters:
      - name: onu-serial-number
        in: path
        required: true
        schema:
          type: string
          maxLength: 12
          pattern: ^[A-Z]{4}[A-F0-9]{8}$
        description: ONU serial number (4 uppercase letters followed by 8 hexadecimal
          characters)
        example: ABCD12FEED78
      responses:
        '200':
          description: Successful ONU status retrieval
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Onu'
              examples:
                OnuResponse:
                  summary: Example ONU detailed status response
                  description: Example of a full ONU status report retrieved using
                    the ONU serial number.
                  $ref: '#/components/examples/OnuResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: bad_request
                message: Invalid onu-serial-number.
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: unauthorized
                message: Missing or invalid authentication token.
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                code: not_found
                message: Requested ONU not found.
components:
  schemas:
    Olt:
      type: object
      description: Optical Line Terminal (OLT) resource.
      properties:
        olt-name:
          type: string
          example: denver-olt-05
        olt-ip-address:
          type: string
          format: ipv4
          example: 192.168.1.10
        olt-mac-address:
          type: string
          example: 00:1A:2B:3C:4D:5E
        olt-model:
          type: string
          example: VendorA-123
        olt-location:
          type: string
          example: Denver, CO Data Center
    Onu:
      type: object
      description: Detailed ONU status object.
      properties:
        onu-serial-number:
          type: string
          example: ABCD12FEED78
        onu-mac-addr:
          type: string
          example: A4:5E:60:1B:3C:9F
        onu-id:
          type: string
          example: 01HF4ZK5X6Y3Q8R2
        admin-state:
          type: string
          enum:
          - up
          - down
          - other
          example: up
        oper-state:
          type: string
          enum:
          - online
          - offline_no_dying_gasp
          - offline_dying_gasp
          - unknown
          example: online
        eth1-oper-state:
          type: string
          description: Operational state of Ethernet port 1
          example: up
        eth1-oper-speed:
          type: string
          description: Operational speed of Ethernet port 1
          example: 10 Gbps
        eth2-oper-state:
          type: string
          description: Operational state of Ethernet port 2
          example: down
        eth2-oper-speed:
          type: string
          description: Operational speed of Ethernet port 2
          example: 0
        uptime:
          type: integer
          description: ONU uptime in seconds since last reboot
          example: 86400
        sla-map:
          type: string
          example: 1G-Residential
        vendor:
          type: string
          example: ABC Inc
        model:
          type: string
          example: ABC3000
        software-version:
          type: string
          example: 2.5.7
        onu-fiber-distance:
          type: number
          description: Fiber distance from OLT to ONU in meters
          example: 1480
        olt-name:
          type: string
          description: Name of the OLT associated with this ONU
          example: denver-olt-05
        olt-pon-port-id:
          type: string
          example: 1/2/3
        olt-rx-level:
          type: number
          example: -23.8
        onu-rx-level:
          type: number
          example: -21.3
        onu-tx-level:
          type: number
          example: 2.1
        power-feed-voltage:
          type: number
          example: 12000
        laser-bias-current:
          type: number
          example: 6200
        temperature:
          type: number
          example: 46.2
        us-bip-errors:
          type: integer
          example: 12
          format: int64
          minimum: 0
        ds-bip-errors:
          type: integer
          example: 8
          format: int64
          minimum: 0
        us-fec-total-codewords:
          type: integer
          example: 1000000
          format: int64
          minimum: 0
        ds-fec-total-codewords:
          type: integer
          example: 2000000
          format: int64
          minimum: 0
        us-fec-corrected-codewords:
          type: integer
          example: 98000
          format: int64
          minimum: 0
        ds-fec-corrected-codewords:
          type: integer
          example: 198000
          format: int64
          minimum: 0
        us-fec-uncorrected-codewords:
          type: integer
          example: 200
          format: int64
          minimum: 0
        ds-fec-uncorrected-codewords:
          type: integer
          example: 2000
          format: int64
          minimum: 0
        us-codeword-error-rate:
          type: number
          example: 0.0002
        ds-codeword-error-rate:
          type: number
          example: 0.001
    Error:
      type: object
      properties:
        code:
          type: string
          example: bad_request
        message:
          type: string
          example: Invalid or missing parameter.
  examples:
    OnuResponse:
      summary: Example ONU detailed status response
      description: Example of a full ONU status report retrieved using the ONU serial
        number.
      value:
        onu-serial-number: ABCD12FEED78
        onu-mac-addr: A4:5E:60:1B:3C:9F
        onu-id: 01HF4ZK5X6Y3Q8R2
        admin-state: up
        oper-state: online
        eth1-oper-state: up
        eth1-oper-speed: 10 Gbps
        eth2-oper-state: down
        eth2-oper-speed: 0
        uptime: 86400
        sla-map: 1G-Residential
        vendor: ABC Inc
        model: ABC3000
        software-version: 2.5.7
        onu-fiber-distance: 1480
        olt-name: denver-olt-05
        olt-pon-port-id: 1/2/3
        olt-rx-level: -23.8
        onu-rx-level: -21.3
        onu-tx-level: 2.1
        power-feed-voltage: 12000
        laser-bias-current: 6200
        temperature: 46.2
        us-bip-errors: 12
        ds-bip-errors: 8
        us-fec-total-codewords: 1000000
        ds-fec-total-codewords: 2000000
        us-fec-corrected-codewords: 98000
        ds-fec-corrected-codewords: 198000
        us-fec-uncorrected-codewords: 200
        ds-fec-uncorrected-codewords: 2000
        us-codeword-error-rate: 0.0002
        ds-codeword-error-rate: 0.001
